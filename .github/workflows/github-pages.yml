# Publishes the SvelteKit static site (repo root) to GitHub Pages at /<repo>/ (BASE_PATH=/clikkle).
#
# Repo settings required (one-time):
#   Settings → Pages → Build and deployment → Source: GitHub Actions
# If Source is still "Deploy from a branch", Actions uploads are ignored and the site stays old.

name: Publish to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-clikkle
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create .env for CI build
        run: |
          echo "PUBLIC_APPWRITE_ENDPOINT=https://cloud.appwrite.io/v1" > .env
          echo "PUBLIC_APPWRITE_DASHBOARD=https://cloud.appwrite.io" >> .env
          echo "PUBLIC_APPWRITE_PROJECT_ID=placeholder" >> .env
          echo "PUBLIC_APPWRITE_DB_MAIN_ID=placeholder" >> .env
          echo "PUBLIC_APPWRITE_COL_THREADS_ID=placeholder" >> .env
          echo "PUBLIC_APPWRITE_COL_MESSAGES_ID=placeholder" >> .env
          echo "PUBLIC_APPWRITE_FN_TLDR_ID=placeholder" >> .env
          echo "PUBLIC_APPWRITE_PROJECT_INIT_ID=placeholder" >> .env
          echo "PUBLIC_GROWTH_ENDPOINT=https://growth.appwrite.io" >> .env
          echo "PUBLIC_ARENA_ENDPOINT=https://arena.appwrite.io" >> .env
          echo "PUBLIC_POSTHOG_API_KEY=placeholder" >> .env
          echo "APPWRITE_DB_INIT_ID=placeholder" >> .env
          echo "APPWRITE_COL_INIT_ID=placeholder" >> .env
          echo "APPWRITE_API_KEY_INIT=placeholder" >> .env

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build static site
        env:
          BASE_PATH: /clikkle
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
