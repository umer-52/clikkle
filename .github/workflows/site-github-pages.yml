# Builds the Next.js static export (`clikkle-app`) and pushes it to the `gh-pages` branch.
# Works even if GitHub Pages was previously unpublished (no GitHub Actions "Pages" artifact deploy).
#
# After the first successful run:
#   Settings → Pages → Build and deployment → Source: Deploy from a branch
#   Branch: gh-pages  /  Folder: / (root)
#
# Repo → Settings → Actions → General → Workflow permissions:
#   enable "Read and write permissions" (required for GITHUB_TOKEN to push gh-pages).

name: Site — build and publish to gh-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site-gh-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies (clikkle-app)
        working-directory: clikkle-app
        run: npm ci

      - name: Build static export (clikkle-app)
        working-directory: clikkle-app
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      # Next.js `basePath: "/clikkle"` writes the site under `out/clikkle/`.
      # GitHub project Pages serves the *branch root* at `https://<user>.github.io/<repo>/`.
      # Publishing all of `out/` would nest the app at `/clikkle/clikkle/` and leave `/clikkle/`
      # serving whatever was at branch root (often an old Svelte export — wrong branding).
      - name: Verify static export layout
        run: test -f clikkle-app/out/clikkle/index.html

      - name: Disable Jekyll (required for _next)
        run: touch clikkle-app/out/clikkle/.nojekyll

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./clikkle-app/out/clikkle
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false

      - name: Live URL hint
        run: |
          echo "If Pages source is set to branch gh-pages (folder /), site:"
          echo "  https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
