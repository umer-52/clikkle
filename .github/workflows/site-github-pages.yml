# Builds the SvelteKit static site and pushes it to the `gh-pages` branch.
# Works even if GitHub Pages was previously unpublished (no GitHub Actions "Pages" artifact deploy).
#
# After the first successful run:
#   Settings → Pages → Build and deployment → Source: Deploy from a branch
#   Branch: gh-pages  /  Folder: / (root)
#
# Repo → Settings → Actions → General → Workflow permissions:
#   enable "Read and write permissions" (required for GITHUB_TOKEN to push gh-pages).

name: Site — build and publish to gh-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site-gh-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create .env for CI build
        run: |
          echo "PUBLIC_APPWRITE_ENDPOINT=https://cloud.appwrite.io/v1" > .env
          echo "PUBLIC_APPWRITE_DASHBOARD=https://cloud.appwrite.io" >> .env
          echo "PUBLIC_APPWRITE_PROJECT_ID=placeholder" >> .env
          echo "PUBLIC_APPWRITE_DB_MAIN_ID=placeholder" >> .env
          echo "PUBLIC_APPWRITE_COL_THREADS_ID=placeholder" >> .env
          echo "PUBLIC_APPWRITE_COL_MESSAGES_ID=placeholder" >> .env
          echo "PUBLIC_APPWRITE_FN_TLDR_ID=placeholder" >> .env
          echo "PUBLIC_APPWRITE_PROJECT_INIT_ID=placeholder" >> .env
          echo "PUBLIC_GROWTH_ENDPOINT=https://growth.appwrite.io" >> .env
          echo "PUBLIC_ARENA_ENDPOINT=https://arena.appwrite.io" >> .env
          echo "PUBLIC_POSTHOG_API_KEY=placeholder" >> .env
          echo "APPWRITE_DB_INIT_ID=placeholder" >> .env
          echo "APPWRITE_COL_INIT_ID=placeholder" >> .env
          echo "APPWRITE_API_KEY_INIT=placeholder" >> .env

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build static site
        env:
          BASE_PATH: /clikkle
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
          force_orphan: true

      - name: Live URL hint
        run: |
          echo "If Pages source is set to branch gh-pages (folder /), site:"
          echo "  https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
