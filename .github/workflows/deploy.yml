name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          
      - name: Create .env
        run: |
          echo "PUBLIC_APPWRITE_ENDPOINT=https://cloud.appwrite.io/v1" > .env
          echo "PUBLIC_APPWRITE_DASHBOARD=https://cloud.appwrite.io" >> .env
          echo "PUBLIC_APPWRITE_PROJECT_ID=placeholder" >> .env
          echo "PUBLIC_APPWRITE_DB_MAIN_ID=placeholder" >> .env
          echo "PUBLIC_APPWRITE_COL_THREADS_ID=placeholder" >> .env
          echo "PUBLIC_APPWRITE_COL_MESSAGES_ID=placeholder" >> .env
          echo "PUBLIC_APPWRITE_FN_TLDR_ID=placeholder" >> .env
          echo "PUBLIC_APPWRITE_PROJECT_INIT_ID=placeholder" >> .env
          echo "PUBLIC_GROWTH_ENDPOINT=https://growth.appwrite.io" >> .env
          echo "PUBLIC_ARENA_ENDPOINT=https://arena.appwrite.io" >> .env
          echo "PUBLIC_POSTHOG_API_KEY=placeholder" >> .env
          echo "APPWRITE_DB_INIT_ID=placeholder" >> .env
          echo "APPWRITE_COL_INIT_ID=placeholder" >> .env
          echo "APPWRITE_API_KEY_INIT=placeholder" >> .env

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build SvelteKit output
        env:
          BASE_PATH: /clikkle
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
